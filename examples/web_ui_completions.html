<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vLLM Completions UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .config-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-section h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #555;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .response-section {
            margin-top: 30px;
        }

        .response-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .response-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
        }

        .response-box.empty {
            color: #999;
            font-style: italic;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border-color: #f5c6cb;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .endpoint-info {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
        }

        .endpoint-info code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 vLLM Completions API</h1>
        <p class="subtitle">Interactive interface for testing completions endpoint</p>

        <div class="endpoint-info">
            <strong>Endpoint:</strong> <code id="endpoint-url">http://localhost:8000/v1/completions</code>
        </div>

        <div class="config-section">
            <h2>⚙️ Configuration</h2>
            <div class="config-grid">
                <div class="config-item">
                    <label for="server-url">Server URL</label>
                    <input type="text" id="server-url" value="http://localhost:8000" placeholder="http://localhost:8000">
                </div>
                <div class="config-item">
                    <label for="model">Model</label>
                    <input type="text" id="model" value="Qwen/Qwen3-32B" placeholder="Qwen/Qwen3-32B">
                </div>
                <div class="config-item">
                    <label for="max-tokens">Max Tokens</label>
                    <input type="number" id="max-tokens" value="32" min="1" max="4096">
                </div>
                <div class="config-item">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" value="0" min="0" max="2" step="0.1">
                </div>
                <div class="config-item">
                    <label for="top-p">Top P</label>
                    <input type="number" id="top-p" value="0.9" min="0" max="1" step="0.1">
                </div>
                <div class="config-item">
                    <label for="top-k">Top K</label>
                    <input type="number" id="top-k" value="10" min="1" max="100">
                </div>
            </div>
        </div>

        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="Enter your prompt here...">What is the capital of France?</textarea>

        <button id="submit-btn" onclick="sendRequest()">
            Send Request
        </button>

        <div class="response-section">
            <h2>📄 Response</h2>
            <div id="response-box" class="response-box empty">
                Response will appear here...
            </div>
        </div>
    </div>

    <script>
        async function sendRequest() {
            const submitBtn = document.getElementById('submit-btn');
            const responseBox = document.getElementById('response-box');
            
            // Get values from inputs
            const serverUrl = document.getElementById('server-url').value.trim();
            const model = document.getElementById('model').value.trim();
            const prompt = document.getElementById('prompt').value;
            const maxTokens = parseInt(document.getElementById('max-tokens').value);
            const temperature = parseFloat(document.getElementById('temperature').value);
            const topP = parseFloat(document.getElementById('top-p').value);
            const topK = parseInt(document.getElementById('top-k').value);

            // Validation
            if (!prompt) {
                responseBox.className = 'response-box error';
                responseBox.textContent = 'Error: Please enter a prompt';
                return;
            }

            if (!serverUrl) {
                responseBox.className = 'response-box error';
                responseBox.textContent = 'Error: Please enter a server URL';
                return;
            }

            // Update endpoint display
            document.getElementById('endpoint-url').textContent = `${serverUrl}/v1/completions`;

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Sending<span class="loading"></span>';
            responseBox.className = 'response-box empty';
            responseBox.textContent = 'Sending request...';

            try {
                const response = await fetch(`${serverUrl}/v1/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: model,
                        prompt: prompt,
                        max_tokens: maxTokens,
                        temperature: temperature,
                        top_p: topP,
                        top_k: topK
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // Extract and display only the generated text
                responseBox.className = 'response-box';
                if (data.choices && data.choices.length > 0 && data.choices[0].text) {
                    responseBox.textContent = data.choices[0].text;
                } else {
                    // Fallback to full JSON if structure is unexpected
                    responseBox.textContent = JSON.stringify(data, null, 2);
                }

            } catch (error) {
                responseBox.className = 'response-box error';
                responseBox.textContent = `Error: ${error.message}\n\nMake sure the server is running at ${serverUrl}`;
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Request';
            }
        }

        // Allow Enter key to submit (with Shift+Enter for newlines)
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendRequest();
            }
        });

        // Update endpoint display on server URL change
        document.getElementById('server-url').addEventListener('input', function(e) {
            document.getElementById('endpoint-url').textContent = `${e.target.value.trim()}/v1/completions`;
        });
    </script>
</body>
</html>
